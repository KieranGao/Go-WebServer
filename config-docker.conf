# Docker 环境配置
resource_root = resources/

# 日志
open_log = true
log_file = log/webserver
log_level = 1
log_queue_size = 1024
log_flush_interval = 3

# 网络
port = 9999
connection_timeout = 60

# 数据库（容器内使用服务名 mysql 作为主机）
connection_pool_size = 16
db_host = mysql
db_port = 3306
db_user = root
db_password = rootpassword
db_name = webserver
