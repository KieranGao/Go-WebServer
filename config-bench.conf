# 压测优化配置
resource_root = resources/

# 关闭日志，消除磁盘I/O瓶颈
open_log = false
log_file = log/webserver
log_level = 3
log_queue_size = 1024
log_flush_interval = 3

# 网络优化
port = 9999
opt_linger = false
trigger_mode = 4
thread_num = 256
max_body_size = 1048576
connection_timeout = 5

# 数据库
connection_pool_size = 64
max_connections = 65535
db_host = 127.0.0.1
db_port = 3306
db_user = root
db_password = password
db_name = webserver
